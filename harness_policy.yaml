policy_version: 3

enforcement:
  default: observe
  missing_governed_artifacts: block

governed_paths:
  - "hooks/**"
  - "hooks.json"
  - "harness_policy.yaml"
  - ".codex/**"
  - "**/auth/**"
  - "**/migrations/**"
  - "**/deploy/**"
  - "**/.github/workflows/**"
  - "**/*sandbox*"
  - "**/*permission*"

governed_path_terms:
  - "auth"
  - "authentication"
  - "authorization"
  - "oauth"
  - "oidc"
  - "sso"

generated_paths:
  - ".git/**"
  - ".mypy_cache/**"
  - ".pytest_cache/**"
  - ".ruff_cache/**"
  - ".venv/**"
  - "__pycache__/**"
  - "build/**"
  - "data/**"
  - "dist/**"
  - "node_modules/**"
  - "probes/results/**"
  - "scratch/**"
  - "cache/**"
  - "tmp/**"
  - ".tmp/**"
  - "log/**"
  - "app-server-control/**"

prompt_risk_terms:
  - "security"
  - "安全"
  - "auth"
  - "authentication"
  - "authorization"
  - "oauth"
  - "oidc"
  - "sso"
  - "permission"
  - "权限"
  - "sandbox"
  - "migration"
  - "迁移"
  - "deploy"
  - "部署"
  - "ci"
  - "performance-sensitive"
  - "性能敏感"
  - "hook enforcement"
  - "harness enforcement"
