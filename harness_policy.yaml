thresholds:
  contract_net_new_lines: 150
  review_net_new_lines: 300
  incremental_reminder_lines: 300
  new_file_min_lines: 80
  incremental_new_files: 5
  large_change_lines: 300
  large_change_new_files: 999

enforcement:
  default: observe
  contract_change: remind
  review_change: remind
  medium_change: observe
  large_change: remind
  risky_change: block
  harness_self_modification: block
  missing_contract_for_risky_change: block
  missing_reviewer_for_risky_change: block
  missing_validation_for_risky_change: block
  missing_wiki_ingest: observe

risky_paths:
  - "hooks/**"
  - "hooks.json"
  - "harness_policy.yaml"
  - ".codex/**"
  - "**/auth/**"
  - "**/migrations/**"
  - "**/deploy/**"
  - "**/.github/workflows/**"
  - "**/*sandbox*"
  - "**/*permission*"

harness_self_paths:
  - "hooks/**"
  - "hooks.json"
  - "harness_policy.yaml"

generated_paths:
  - ".git/**"
  - ".mypy_cache/**"
  - ".pytest_cache/**"
  - ".ruff_cache/**"
  - ".venv/**"
  - "__pycache__/**"
  - "build/**"
  - "data/**"
  - "dist/**"
  - "node_modules/**"
  - "probes/results/**"
  - "scratch/**"
  - "cache/**"
  - "tmp/**"
  - ".tmp/**"

validation_commands:
  - "pytest"
  - "unittest"
  - "py_compile"
  - "ruff"
  - "mypy"
  - "tsc"
  - "npm test"
  - "bun test"
  - "cargo test"
  - "go test"
